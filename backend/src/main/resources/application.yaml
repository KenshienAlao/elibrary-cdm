spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: elibrary

  datasource:
    url: ${DB_URL}
    driver-class-name: org.postgresql.Driver
    hikari:
      data-source-properties:
        sslmode: require

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true

server:
  port: ${SERVER_PORT:8080}

jwt:
  secret: ${JWT_SECRET}
  access-expiration: ${JWT_ACCESS_EXPIRATION} # 15 min
  refresh-expiration: ${JWT_REFRESH_EXPIRATION} # 7 days

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS}
